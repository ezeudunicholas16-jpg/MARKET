services:
  postgres:
    image: postgres:16-alpine
    container_name: market-desk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketdesk
      POSTGRES_PASSWORD: marketdesk
      POSTGRES_DB: marketdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketdesk -d marketdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: market-desk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
